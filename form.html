<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index.html
</title>
    
</head>
<link rel="stylesheet" href="/dev/css/form.css" </head>
<body style="background-color: silver;font-family: 'Courier New', Courier, monospace;">
    <h1 id="título" style="color: #fff;"> Cadrasto de DEVS | Programador Web</h1>
    <center>
        <fieldset style="background-color: darkgrey;"> <!--Organizar formulario-->
            <center>
                <legend> Informação de contato</legend>
            </center>
            <label for="nome-completo">Nome completo</label>
            <input type="text" id="nome" name="nome" size="27" placeholder="digite seu nome completo" required> <br><br>
            <label for="Email"> E-mail:</label>
            <input type="text" id="email" name="email" size="27" placeholder="seugmail@gmail.com" maxlength="30"
                required>
            <label for="Celular"> celular</label>
            <input type="number " id="celular" name="celular" size="20" placeholder="ex (11) 92276-4938" maxlength="20"
                required> <br><br>
            <label for="Endereço"> Endereco</label>
            <input type="text" id="endereço" name="endereco" size="30" placeholder="ex:Rua Flores, 123 - Apto 4, SP"
                maxlength="35" required>
            <label for="Número"> Numero</label>
            <input type="number" id="numero" name="numero" size="5" placeholder="809" maxlength="5" required> <br><br>
            <label for="Complemento"> Complemento</label>
            <input type="text" id="Complemento" name="Complemento" size="70" maxlength="30"
                placeholder="Apto 501, Bloco , Sala 203, Casa 2, Fundos, ou Condomínio Primavera" required> <br><br>
            <label for="Bairro">bairro</label>
            <input type="text" id="bairro" name="bairro" size="20" placeholder="itaquera" maxlength="30" required>

            <label for="Cidade"> Cidade</label>
            <input type="text" id="Cidade" name="Cidade" size="60" maxlength="30" placeholder=" São paulo" required>
            <br><br>
            <label for="Estado">Estado</label>
            <select id="estado" name="estado">
                <option value="">Selecione</option>
                <option value="AC">Acre</option>
                <option value="AL">Alagoas</option>
                <option value="AP">Amapá</option>
                <option value="AM">Amazonas</option>
                <option value="BA">Bahia</option>
                <option value="CE">Ceará</option>
                <option value="DF">Distrito Federal</option>
                <option value="ES">Espírito Santo</option>
                <option value="GO">Goiás</option>
                <option value="MA">Maranhão</option>
                <option value="MT">Mato Grosso</option>
                <option value="MS">Mato Grosso do Sul</option>
                <option value="MG">Minas Gerais</option>
                <option value="PA">Pará</option>
                <option value="PB">Paraíba</option>
                <option value="PR">Paraná</option>
                <option value="PE">Pernambuco</option>
                <option value="PI">Piauí</option>
                <option value="RJ">Rio de Janeiro</option>
                <option value="RN">Rio Grande do Norte</option>
                <option value="RS">Rio Grande do Sul</option>
                <option value="RO">Rondônia</option>
                <option value="RR">Roraima</option>
                <option value="SC">Santa Catarina</option>
                <option value="SP">São Paulo</option>
                <option value="SE">Sergipe</option>
                <option value="TO">Tocantins</option>

            </select>
            <label for="CEP"> CEP</label>
            <input type="number" id="CEP" name="CEP" size="15" placeholder="00000-000" maxlength="25" required>

        </fieldset>
    </center>
    <fieldset>
        <br>
    </fieldset>
    <fieldset>
        <legend>Experiência Profissional</legend>
        <br>
        <label>
            <input type="radio" name="Dev-web" id="Dev-web" value="back-end"> back-end

            <input type="radio" name="Dev-web" id="Dev-web" value="Front-end"> Front-end
            <input type="radio" name="Dev-web" id="Dev-web" value="full-stacks">full-stack

        </label>
        <br><br>
        <label for="Conhecimento"> qual o seu nível de conhecimento? </label>
        <select name="Conhecimento" id="Conhecimento"> required
            <option selected disabled value=""> Selecione</option>
            <option> Junior</option>
            <option>pleno</option>
            <option>Sênior</option>
            <option>Especialista</option>

        </select>
        <br><br>
        <label> Selecione as tecnologias que ultiliza</label>
        <input type="Checkbox" name="Tecnologia" id="tecnologia1" value="HTML">
        <label for="Tecnologia1">HTML</label>
        <input type="checkbox" name="tecnologia2" id="tecnologia2" value="CSS">
        <label for="tecnologia2">CSS</label>
        <input type="Checkbox" name="Tecnologia3" id="tecnologia3" value="Javascript">
        <label for="tecnologia3">JAVASCRIPT</label>
        <input type="checkbox" name="tecnologia4" id="tecnologia4" value="Python">
        <label for="tecnologia4">PYTHON</label>
        <input type="Checkbox" name="Tecnologia5" id="tecnologia5" value="c#">
        <label for="tecnologia5">C#</label>
        <input type="Checkbox" name="Tecnologia6" id="tecnologia6" value="Java">
        <label for="tecnologia6">JAVA</label>
        <input type="Checkbox" name="Tecnologia7" id="tecnologia7" value="kotlin">
        <label for="tecnologia7">KOTLIN</label>
        <input type="Checkbox" name="Tecnologia8" id="tecnologia8" value="PL-SQL">
        <label for="tecnologia8">PL-SQL</label>
        <br><br>
        <label for="experiência"> conte uma pouco mais sobre sua experiência</label>
        <br>
        <textarea rows="6" style="width: 26em;" id="experiência"></textarea>
    </fieldset>
    <button type="reset">Limpar</button>
    <button type="submit">enviar </button>

    </form>

</body>

</html>
